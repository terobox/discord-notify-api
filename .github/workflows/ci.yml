name: CI-AUTO

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  APP_NAME: discord-notify-api
  REMOTE_DIR: /srv/app/discord-notify-api

jobs:
# ---------------------------------------------------------------- Build & Release
  build:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ github.ref_name }}

    steps:
      - uses: actions/checkout@v4

      - name: Ensure run is based on tag
        run: |
          echo "GITHUB_REF=$GITHUB_REF"
          if [[ "$GITHUB_REF" != refs/tags/* ]]; then
            echo "[ERROR] This workflow must be triggered from a Git tag (refs/tags/v*)"
            exit 1
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build binary
        run: |
          go build -o "$APP_NAME" main.go
          echo "✅ Build success: $APP_NAME"

      - name: Create Release & upload binary
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: ${{ env.APP_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# ---------------------------------------------------------------- Deploy
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: success()
    concurrency:
      group: ${{ github.workflow }}
      cancel-in-progress: true

    steps:
      # 1️⃣ 仅检出部署脚本文件
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            deploy.sh
          sparse-checkout-cone-mode: false

      # 2️⃣ 上传部署脚本到远程服务器
      - name: Upload deploy.sh
        uses: appleboy/scp-action@v1.0.0
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          port:     ${{ secrets.SSH_PORT || '22' }}
          source:   "deploy.sh"
          target:   "${{ env.REMOTE_DIR }}"
          strip_components: 0

      # 3️⃣ 在远程服务器上执行部署脚本
      - name: Run deploy script
        uses: appleboy/ssh-action@v1.2.2
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          port:     ${{ secrets.SSH_PORT || '22' }}
          envs:     APP_NAME,REMOTE_DIR
          script: |
            cd "${REMOTE_DIR}"
            chmod +x deploy.sh
            VERSION="${{ needs.build.outputs.tag }}"   # 使用 Git 标签作为版本号
            ./deploy.sh "$APP_NAME" "$VERSION"
